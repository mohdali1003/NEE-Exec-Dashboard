<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apex · Executive Intelligence</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23003828'/><circle cx='12' cy='11' r='7' fill='%2300915a' opacity='0.6'/><circle cx='20' cy='20' r='6' fill='%230066cc' opacity='0.5'/></svg>"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const T = {
  bg:"#f3f5f8",glass:"rgba(255,255,255,0.55)",glass2:"rgba(255,255,255,0.72)",blur:"blur(22px)",
  green:"#00915a",greenBg:"rgba(0,145,90,0.06)",greenBd:"rgba(0,145,90,0.13)",
  blue:"#0066cc",blueBg:"rgba(0,102,204,0.05)",blueBd:"rgba(0,102,204,0.11)",
  ink:"#0a1628",i80:"rgba(10,22,40,0.78)",i60:"rgba(10,22,40,0.52)",i40:"rgba(10,22,40,0.32)",
  i25:"rgba(10,22,40,0.18)",i12:"rgba(10,22,40,0.08)",i06:"rgba(10,22,40,0.04)",
  red:"#dc3545",redBg:"rgba(220,53,69,0.05)",amber:"#d97706",amberBg:"rgba(217,119,6,0.05)",
  bd:"rgba(0,0,0,0.04)",bdG:"rgba(255,255,255,0.50)",
  sh:"0 1px 3px rgba(0,0,0,0.025),0 4px 14px rgba(0,0,0,0.02)",
  sh2:"0 2px 8px rgba(0,0,0,0.04),0 8px 28px rgba(0,0,0,0.035)",
  sh3:"0 8px 32px rgba(0,0,0,0.05),0 16px 48px rgba(0,0,0,0.035)",
  f:"'Plus Jakarta Sans',-apple-system,sans-serif",r:14,
};
const CSS=`
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}body{font-family:${T.f}}
button{font-family:${T.f};cursor:pointer}input{font-family:${T.f}}
input::placeholder{color:${T.i25}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.05);border-radius:2px}
@keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes orbGlow{0%,100%{box-shadow:0 0 28px rgba(0,145,90,.1),0 0 56px rgba(0,102,204,.04)}50%{box-shadow:0 0 42px rgba(0,145,90,.2),0 0 80px rgba(0,102,204,.07)}}
@keyframes orbTalk{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes orbMorph{0%,100%{border-radius:50%}25%{border-radius:47% 53% 51% 49%}75%{border-radius:52% 48% 47% 53%}}
@keyframes orbSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes orbSpinR{0%{transform:rotate(0deg)}100%{transform:rotate(-360deg)}}
@keyframes orbPulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.15);opacity:0.9}}
@keyframes orbBreath{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes orbDrift{0%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(3px,-4px) rotate(2deg)}50%{transform:translate(-2px,-6px) rotate(-1deg)}75%{transform:translate(-4px,-2px) rotate(1deg)}100%{transform:translate(0,0) rotate(0deg)}}
@keyframes particleOrbit1{0%{transform:rotate(0deg) translateX(var(--orbit-r)) rotate(0deg);opacity:0.3}25%{opacity:0.8}50%{opacity:0.3}75%{opacity:0.7}100%{transform:rotate(360deg) translateX(var(--orbit-r)) rotate(-360deg);opacity:0.3}}
@keyframes particleOrbit2{0%{transform:rotate(120deg) translateX(var(--orbit-r)) rotate(-120deg);opacity:0.5}50%{opacity:0.9}100%{transform:rotate(480deg) translateX(var(--orbit-r)) rotate(-480deg);opacity:0.5}}
@keyframes particleOrbit3{0%{transform:rotate(240deg) translateX(var(--orbit-r)) rotate(-240deg);opacity:0.4}50%{opacity:0.8}100%{transform:rotate(600deg) translateX(var(--orbit-r)) rotate(-600deg);opacity:0.4}}
@keyframes ringPulse{0%,100%{opacity:0.15;transform:scale(1)}50%{opacity:0.35;transform:scale(1.02)}}
@keyframes dataFlow{0%{stroke-dashoffset:100}100%{stroke-dashoffset:0}}
@keyframes ring{to{transform:rotate(360deg)}}
@keyframes ringR{to{transform:rotate(-360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes dotPulse{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.1)}}
@keyframes expand{from{max-height:0;opacity:0}to{max-height:700px;opacity:1}}
@keyframes sourceConnect{0%{width:0;opacity:0}50%{opacity:1}100%{width:100%;opacity:1}}
@keyframes typeWriter{from{width:0}to{width:100%}}
.hov{transition:all .25s cubic-bezier(.16,1,.3,1)}.hov:hover{transform:translateY(-1px);box-shadow:${T.sh2}}
`;

/* ═══ ENHANCED ORB ═══ */
function Orb({size=120,talking=false,float=true,spinning=false,breathing=false,drifting=false,particles=false,rings=0,sx={}}){
  const baseAnim = [];
  if(float) baseAnim.push("orbFloat 5s ease-in-out infinite");
  if(drifting) baseAnim.push("orbDrift 8s ease-in-out infinite");
  if(breathing) baseAnim.push("orbBreath 4s ease-in-out infinite");

  return(
    <div style={{position:"relative",width:size,height:size,animation:baseAnim.join(",")||"none",flexShrink:0,...sx}}>
      {/* Orbital rings */}
      {Array.from({length:Math.max(rings,2)}).map((_,i)=>(
        <div key={`ring-${i}`} style={{
          position:"absolute",
          inset:-(8+i*6),
          borderRadius:"50%",
          border:`1px solid ${i%2===0?"rgba(0,145,90,0.07)":"rgba(0,102,204,0.04)"}`,
          animation:`${i%2===0?"orbSpin":"orbSpinR"} ${12+i*5}s linear infinite`,
          ...(spinning?{animationDuration:`${6+i*3}s`}:{})
        }}/>
      ))}
      {/* Extra decorative rings for large orbs */}
      {rings>2 && Array.from({length:rings-2}).map((_,i)=>(
        <div key={`xring-${i}`} style={{
          position:"absolute",
          inset:-(20+i*10),
          borderRadius:"50%",
          border:`1px solid rgba(0,145,90,${0.03-i*0.005})`,
          animation:`orbSpin ${20+i*8}s linear infinite, ringPulse ${4+i*2}s ease-in-out infinite`,
        }}/>
      ))}
      {/* Particles */}
      {particles && (
        <React.Fragment>
          {[1,2,3,4,5].map(i=>(
            <div key={`p-${i}`} style={{
              position:"absolute",
              top:"50%",left:"50%",
              width:i<=3?4:3,height:i<=3?4:3,
              marginTop:-2,marginLeft:-2,
              borderRadius:"50%",
              background:i%2===0?"rgba(0,145,90,0.6)":"rgba(0,102,204,0.5)",
              "--orbit-r":`${size*0.55+i*4}px`,
              animation:`particleOrbit${((i-1)%3)+1} ${7+i*2}s linear infinite`,
              filter:"blur(0.5px)"
            }}/>
          ))}
        </React.Fragment>
      )}
      {/* Core gradient sphere */}
      <div style={{
        position:"absolute",inset:0,borderRadius:"50%",
        background:"radial-gradient(circle at 35% 28%,rgba(0,145,90,0.5),transparent 55%),radial-gradient(circle at 62% 62%,rgba(0,102,204,0.4),transparent 55%),radial-gradient(circle at 50% 50%,rgba(255,255,255,0.25),transparent 60%),radial-gradient(circle,rgba(0,50,35,0.55),transparent 70%)",
        animation:talking
          ?"orbTalk 1.4s ease-in-out infinite,orbMorph 3s ease-in-out infinite"
          :"orbGlow 4s ease-in-out infinite,orbMorph 7s ease-in-out infinite"
      }}/>
      {/* Specular highlight */}
      <div style={{
        position:"absolute",top:"7%",left:"10%",width:"38%",height:"20%",
        borderRadius:"50%",
        background:"radial-gradient(ellipse,rgba(255,255,255,0.28),transparent 70%)",
        filter:"blur(3px)"
      }}/>
    </div>
  );
}
function PBar({pct=0,color=T.green,h=5}){return<div style={{width:"100%",height:h,borderRadius:h,background:T.i06,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",borderRadius:h,background:color,transition:"width .8s cubic-bezier(.16,1,.3,1)"}}/></div>}
function Badge({type="neutral",children}){const m={critical:{c:T.red,bg:T.redBg},high:{c:T.amber,bg:T.amberBg},medium:{c:T.blue,bg:T.blueBg},low:{c:T.green,bg:T.greenBg},positive:{c:T.green,bg:T.greenBg},negative:{c:T.red,bg:T.redBg},neutral:{c:T.i40,bg:T.i06}};const s=m[type]||m.neutral;return<span style={{fontSize:10,fontWeight:600,padding:"3px 10px",borderRadius:20,background:s.bg,color:s.c,whiteSpace:"nowrap"}}>{children}</span>}
function Glass({title,sub,children,right,sx={}}){return(<div className="hov" style={{background:T.glass,backdropFilter:T.blur,WebkitBackdropFilter:T.blur,border:`1px solid ${T.bdG}`,borderRadius:T.r+2,padding:22,boxShadow:T.sh,...sx}}>{(title||right)&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:sub?2:14}}><div>{title&&<div style={{fontSize:14,fontWeight:700,color:T.ink}}>{title}</div>}{sub&&<div style={{fontSize:11,color:T.i25,marginTop:3,marginBottom:12}}>{sub}</div>}</div>{right}</div>}{children}</div>)}
function Pill({active,children,onClick}){return<button onClick={onClick} style={{padding:"7px 16px",borderRadius:20,background:active?T.greenBg:"rgba(255,255,255,0.45)",border:`1px solid ${active?T.greenBd:T.bd}`,color:active?T.green:T.i40,fontSize:12,fontWeight:active?600:500,transition:"all .2s",whiteSpace:"nowrap"}}>{children}</button>}
function Metric({label,value,change,up=true,delay=0}){return(<div className="hov" style={{background:T.glass,backdropFilter:T.blur,border:`1px solid ${T.bdG}`,borderRadius:T.r,padding:"14px 18px",flex:"1 1 0",minWidth:140,boxShadow:T.sh,animation:`fadeUp .4s ease ${delay}s both`}}><div style={{fontSize:10,color:T.i25,letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600,marginBottom:8}}>{label}</div><div style={{fontSize:22,fontWeight:800,color:T.ink,lineHeight:1,letterSpacing:"-0.03em"}}>{value}</div><div style={{fontSize:11,color:up?T.green:T.red,fontWeight:600,marginTop:7}}>{up?"▲":"▼"} {change}</div></div>)}
function Ring({value,max=100,color=T.green,size=56}){const r=size/2-4;const circ=2*Math.PI*r;const off=circ-(value/max)*circ;return(<div style={{position:"relative",width:size,height:size}}><svg width={size} height={size}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.i06} strokeWidth={4}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={4} strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dashoffset .8s"}}/></svg><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size>50?16:13,fontWeight:800,color}}>{value}</div></div>)}

/* ═══ TOAST ═══ */
function Toast({message,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2500);return()=>clearTimeout(t)},[]);
  return(<div style={{position:"fixed",bottom:32,left:"50%",transform:"translateX(-50%)",zIndex:9999,padding:"12px 24px",borderRadius:12,background:"rgba(10,22,40,0.88)",backdropFilter:"blur(12px)",color:"#fff",fontSize:13,fontWeight:500,boxShadow:T.sh3,animation:"fadeUp .3s ease"}}>{message}</div>);
}

/* ═══ SPLASH — Enhanced with spinning orb ═══ */
function Splash({onDone}){
  const[p,sP]=useState(0);
  useEffect(()=>{const a=setTimeout(()=>sP(1),250);const b=setTimeout(()=>sP(2),2600);const c=setTimeout(onDone,3200);return()=>{clearTimeout(a);clearTimeout(b);clearTimeout(c)}},[]);
  return(<div style={{position:"fixed",inset:0,zIndex:1000,background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:p===2?0:1,transition:"opacity .6s"}}>
    <div style={{opacity:p>=1?1:0,transform:p>=1?"scale(1)":"scale(0.8)",transition:"all 1s cubic-bezier(.16,1,.3,1)"}}>
      <Orb size={120} float={false} spinning={true} breathing={true} particles={true} rings={4}/>
    </div>
    <div style={{textAlign:"center",marginTop:44,opacity:p>=1?1:0,transform:p>=1?"translateY(0)":"translateY(18px)",transition:"all .8s ease .25s"}}>
      <div style={{fontSize:48,fontWeight:800,letterSpacing:"-0.05em",color:T.ink}}>Apex</div>
      <div style={{fontSize:11,color:T.i25,marginTop:12,letterSpacing:"0.35em",textTransform:"uppercase",fontWeight:500}}>Executive Intelligence</div>
    </div>
  </div>);
}

/* ═══ ONBOARDING — Orb only, no icons ═══ */
const OB_STEPS=[
  {title:"Your AI executive briefing",desc:"Apex synthesizes your emails, calendar, market data, regulatory filings, and internal reports into actionable intelligence — every morning.",orbProps:{size:80,spinning:true,breathing:true,particles:true,rings:3}},
  {title:"Email intelligence",desc:"Apex monitors your inbox and organizes emails by topic — Rewire, NEP, IRA, and more. Chat with any collection in natural language.",orbProps:{size:80,spinning:true,talking:true,particles:false,rings:2}},
  {title:"Calendar analytics",desc:"See how you allocate your time across strategy, operations, IR, and more. AI flags patterns and recommends adjustments.",orbProps:{size:80,spinning:false,drifting:true,breathing:true,particles:true,rings:2}},
  {title:"Market & regulatory",desc:"Real-time stock performance, analyst consensus, investor sentiment, and government policy tracking — all in one place.",orbProps:{size:80,spinning:true,particles:true,rings:4}},
];
function Onboarding({onDone}){
  const[step,setStep]=useState(0);
  const[show,setShow]=useState(false);
  useEffect(()=>{setTimeout(()=>setShow(true),150)},[]);
  const s=OB_STEPS[step];
  return(
    <div style={{position:"fixed",inset:0,zIndex:900,background:T.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:480,textAlign:"center",opacity:show?1:0,transform:show?"translateY(0)":"translateY(16px)",transition:"all .5s"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:36}}>
          <Orb key={step} float={true} {...s.orbProps}/>
        </div>
        <div style={{fontSize:26,fontWeight:800,letterSpacing:"-0.03em",color:T.ink,marginBottom:12}}>{s.title}</div>
        <div style={{fontSize:14,color:T.i40,lineHeight:1.7,maxWidth:400,margin:"0 auto 36px"}}>{s.desc}</div>
        <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:28}}>
          {OB_STEPS.map((_,i)=><div key={i} style={{width:i===step?24:8,height:8,borderRadius:4,background:i===step?T.green:T.i12,transition:"all .3s"}}/>)}
        </div>
        <div style={{display:"flex",gap:12,justifyContent:"center"}}>
          {step>0&&<button onClick={()=>{setShow(false);setTimeout(()=>{setStep(step-1);setShow(true)},200)}} style={{padding:"12px 28px",borderRadius:12,background:"rgba(255,255,255,0.5)",border:`1px solid ${T.bd}`,color:T.i40,fontSize:14,fontWeight:600}}>Back</button>}
          <button onClick={()=>{if(step<OB_STEPS.length-1){setShow(false);setTimeout(()=>{setStep(step+1);setShow(true)},200)}else{onDone()}}} style={{padding:"12px 36px",borderRadius:12,background:T.greenBg,border:`1px solid ${T.greenBd}`,color:T.green,fontSize:14,fontWeight:700}}>
            {step<OB_STEPS.length-1?"Next →":"Get Started →"}
          </button>
        </div>
        {step<OB_STEPS.length-1&&<button onClick={onDone} style={{marginTop:16,background:"none",border:"none",color:T.i25,fontSize:12}}>Skip intro</button>}
      </div>
    </div>
  );
}

/* ═══ CHAT HOME — Dedicated screen ═══ */
const DATA_SOURCES = [
  {id:"email",label:"Email",count:"178 threads",icon:"✉",color:T.blue,detail:"Outlook · 5 topic clusters"},
  {id:"calendar",label:"Calendar",count:"4 weeks",icon:"◷",color:"#7c5aef",detail:"Outlook · time analytics"},
  {id:"market",label:"Market Data",count:"Live feed",icon:"◇",color:T.green,detail:"Bloomberg · Reuters · S&P"},
  {id:"regulatory",label:"Regulatory",count:"5 policies",icon:"⬡",color:T.amber,detail:"FERC · Treasury · FL PSC"},
  {id:"financials",label:"Financials",count:"Weekly P&L",icon:"◻",color:"#0ea5e9",detail:"Internal · SAP · reporting"},
  {id:"pipeline",label:"Pipeline",count:"5 vettings",icon:"◆",color:"#10b981",detail:"Deal flow · diligence"},
];
const CHAT_PROMPTS = [
  {q:"Summarize today's daily clips",cat:"Intelligence",color:T.green},
  {q:"What changed in the weekly P&L?",cat:"Financials",color:"#0ea5e9"},
  {q:"What are the latest Rewire emails?",cat:"Email",color:T.blue},
  {q:"How did I spend my time last week?",cat:"Calendar",color:"#7c5aef"},
  {q:"What's the team's view on wind costs?",cat:"Operations",color:"#10b981"},
  {q:"Give me board meeting talking points",cat:"Strategy",color:T.amber},
  {q:"What's the NEP investor sentiment?",cat:"Market",color:T.red},
  {q:"What's our storm exposure?",cat:"Risk",color:T.amber},
];

function ChatHome({onAsk,onDashboard}){
  const[show,setShow]=useState(false);
  const[inp,setInp]=useState("");
  const[sourcesVisible,setSourcesVisible]=useState(false);
  useEffect(()=>{
    setTimeout(()=>setShow(true),100);
    setTimeout(()=>setSourcesVisible(true),600);
  },[]);

  const handleSend = () => {
    const q = inp.trim();
    if(q) onAsk(q);
  };

  return(
    <div style={{position:"fixed",inset:0,zIndex:800,background:T.bg,display:"flex",flexDirection:"column",overflow:"auto"}}>
      {/* Top bar */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 36px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Orb size={22} float={false}/>
          <span style={{fontSize:17,fontWeight:800,letterSpacing:"-0.03em",color:T.ink}}>Apex</span>
        </div>
        <button onClick={onDashboard} style={{padding:"8px 18px",borderRadius:8,background:"rgba(255,255,255,0.5)",border:`1px solid ${T.bd}`,color:T.i60,fontSize:12,fontWeight:600}}>Dashboard →</button>
      </div>

      {/* Center content */}
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 24px 40px",maxWidth:720,margin:"0 auto",width:"100%"}}>
        {/* Orb */}
        <div style={{opacity:show?1:0,transform:show?"scale(1) translateY(0)":"scale(0.85) translateY(20px)",transition:"all 1s cubic-bezier(.16,1,.3,1)",marginBottom:40}}>
          <Orb size={100} float={false} spinning={true} drifting={true} breathing={true} particles={true} rings={4}/>
        </div>

        {/* Greeting */}
        <div style={{textAlign:"center",opacity:show?1:0,transform:show?"translateY(0)":"translateY(16px)",transition:"all .7s ease .15s",marginBottom:10}}>
          <div style={{fontSize:32,fontWeight:800,letterSpacing:"-0.04em",color:T.ink}}>Good morning, Armando.</div>
        </div>
        <div style={{textAlign:"center",opacity:show?1:0,transition:"opacity .6s ease .3s",marginBottom:36}}>
          <div style={{fontSize:14,color:T.i40,lineHeight:1.7,maxWidth:480}}>
            I've analyzed your emails, calendar, market data, and regulatory filings overnight. Ask me anything.
          </div>
        </div>

        {/* Input */}
        <div style={{width:"100%",maxWidth:560,marginBottom:36,opacity:show?1:0,transform:show?"translateY(0)":"translateY(12px)",transition:"all .6s ease .35s"}}>
          <div style={{display:"flex",gap:10,background:T.glass2,backdropFilter:T.blur,border:`1px solid ${T.bdG}`,borderRadius:16,padding:"6px 6px 6px 20px",boxShadow:T.sh2}}>
            <input
              value={inp}
              onChange={e=>setInp(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleSend()}
              placeholder="Ask Apex anything..."
              style={{flex:1,padding:"14px 0",background:"transparent",border:"none",color:T.ink,fontSize:15,outline:"none",fontFamily:T.f}}
            />
            <button onClick={handleSend} style={{padding:"14px 22px",borderRadius:12,background:"radial-gradient(circle at 38% 32%,rgba(0,145,90,0.45),rgba(0,102,204,0.3),rgba(0,40,60,0.75))",border:"none",color:"#fff",fontSize:15,fontWeight:700,flexShrink:0}}>✦</button>
          </div>
        </div>

        {/* Suggested prompts */}
        <div style={{width:"100%",maxWidth:600,marginBottom:40,opacity:show?1:0,transition:"opacity .6s ease .45s"}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
            {CHAT_PROMPTS.map((c,i)=>(
              <button key={i} onClick={()=>onAsk(c.q)} style={{
                padding:"10px 18px",borderRadius:24,
                background:T.glass,backdropFilter:T.blur,
                border:`1px solid ${T.bdG}`,
                color:T.i60,fontSize:12,fontWeight:500,
                boxShadow:T.sh,
                transition:"all .25s",
                animation:`fadeUp .4s ease ${0.5+i*0.04}s both`,
              }}
              onMouseEnter={e=>{e.target.style.borderColor=c.color+"30";e.target.style.color=c.color;e.target.style.transform="translateY(-1px)"}}
              onMouseLeave={e=>{e.target.style.borderColor=T.bdG;e.target.style.color=T.i60;e.target.style.transform="translateY(0)"}}
              >
                <span style={{fontSize:9,fontWeight:700,color:c.color,marginRight:6,letterSpacing:".04em"}}>{c.cat.toUpperCase()}</span>
                {c.q}
              </button>
            ))}
          </div>
        </div>

        <Sidebar tab={tab} setTab={setTab} col={col} setCol={setCol} onChatHome={goChatHome}/>
        <div style={{marginLeft:ml,transition:"margin-left .3s",minHeight:"100vh"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 28px",borderBottom:`1px solid ${T.bd}`,background:"rgba(255,255,255,0.42)",backdropFilter:T.blur,position:"sticky",top:0,zIndex:40}}><div><div style={{fontSize:18,fontWeight:800}}>{TITLES[tab]}</div><div style={{fontSize:11,color:T.i25,marginTop:1}}>NextEra Energy · NEE</div></div><div style={{display:"flex",alignItems:"center",gap:10}}><div onClick={goChatHome} style={{padding:"7px 14px",borderRadius:9,background:"rgba(255,255,255,0.5)",border:`1px solid ${T.bd}`,fontSize:12,color:T.i25,display:"flex",alignItems:"center",gap:7,minWidth:160,cursor:"pointer"}}><span style={{opacity:.4}}>⌕</span>Ask Apex...</div><div style={{width:30,height:30,borderRadius:8,background:T.greenBg,border:`1px solid ${T.greenBd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:T.green}}>A</div></div></div>
          <div style={{padding:"24px 28px"}}>
            {tab==="briefing"&&<VBriefing onAsk={openA}/>}
            {tab==="email"&&<VEmail onAsk={openA}/>}
            {tab==="calendar"&&<VCalendar onAsk={openA}/>}
            {tab==="market"&&<VMarket/>}
            {tab==="regulatory"&&<VRegulatory/>}
            {tab==="financials"&&<VFinancials/>}
            {tab==="kpis"&&<VKpis/>}
            {tab==="vettings"&&<VVettings/>}
          </div>
        </div>
        <button onClick={()=>openA()} style={{position:"fixed",bottom:28,right:28,zIndex:80,border:"none",width:54,height:54,borderRadius:"50%",background:"radial-gradient(circle at 38% 32%,rgba(0,145,90,0.45),rgba(0,102,204,0.3),rgba(0,40,60,0.75))",boxShadow:"0 2px 16px rgba(0,145,90,0.1)",display:"flex",alignItems:"center",justifyContent:"center",animation:"orbGlow 4s ease-in-out infinite"}}><span style={{fontSize:18,color:"#fff"}}>✦</span></button>
        <Agent open={agent} onClose={closeA} initQ={aQ}/>
      </div>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Apex/>);
</script>
</body>
</html>
